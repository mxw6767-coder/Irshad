<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Irshad</title>
    <meta http-equiv="refresh" content="0;url=https://irshad-tau.vercel.app/" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #090b10;
        color: white;
        font-family: Segoe UI, Inter, system-ui, sans-serif;
      }
      body {
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 560px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: rgba(255,255,255,0.7);
        line-height: 1.6;
      }
      code {
        color: #a5b4fc;
      }
    </style>
    <script>
      window.location.replace("https://irshad-tau.vercel.app/");
    </script>
  </head>
  <body>
    <div class="card">
      <h1>Launching Irshad</h1>
      <p>
        If the app does not open automatically, go to
        <code>https://irshad-tau.vercel.app/</code>.
      </p>
    </div>
  </body>
</html>
